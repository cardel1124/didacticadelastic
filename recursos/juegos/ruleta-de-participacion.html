<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruleta de Participación - Escuela Normal Superior del Alto Sinú</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --verde: #2d7a3a;
    --verde-oscuro: #1a4d24;
    --amarillo: #f5c518;
    --azul: #1a3a6b;
    --azul-claro: #2a5298;
    --blanco: #f8f9fa;
    --gris: #343a40;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #0a1a0f 0%, #0d2b1a 40%, #0a1a2e 100%);
    min-height: 100vh;
    color: var(--blanco);
    overflow-x: hidden;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,0.2) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 20px 30px;
    background: linear-gradient(90deg, rgba(26,77,36,0.8), rgba(26,58,107,0.8), rgba(26,77,36,0.8));
    border: 1px solid rgba(245,197,24,0.4);
    border-radius: 16px;
    margin-bottom: 30px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .logo-img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 3px solid var(--amarillo);
    box-shadow: 0 0 20px rgba(245,197,24,0.5);
    object-fit: cover;
    flex-shrink: 0;
  }

  .header-text {
    text-align: center;
  }

  .header-text h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1rem, 2.5vw, 1.6rem);
    font-weight: 900;
    color: var(--amarillo);
    text-shadow: 0 0 20px rgba(245,197,24,0.5);
    line-height: 1.2;
  }

  .header-text p {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.7);
    margin-top: 4px;
    font-style: italic;
  }

  /* MAIN LAYOUT */
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 400px;
    gap: 30px;
    align-items: start;
  }

  /* ROULETTE SECTION */
  .roulette-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .roulette-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .roulette-outer {
    width: 480px;
    height: 480px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2d7a3a, #1a4d24, #1a3a6b);
    padding: 8px;
    box-shadow: 0 0 40px rgba(245,197,24,0.3), 0 0 80px rgba(0,0,0,0.8);
    position: relative;
  }

  .roulette-outer::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: conic-gradient(var(--amarillo), var(--verde), var(--azul), var(--amarillo));
    z-index: -1;
    animation: rotateBorder 6s linear infinite;
  }

  @keyframes rotateBorder {
    to { transform: rotate(360deg); }
  }

  canvas#rouletteCanvas {
    border-radius: 50%;
    display: block;
  }

  /* POINTER */
  .pointer {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 36px solid var(--amarillo);
    filter: drop-shadow(0 4px 8px rgba(245,197,24,0.8));
    z-index: 10;
  }

  /* CENTER BUTTON */
  .center-btn {
    position: absolute;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle, #f5c518, #e6a800);
    border: 5px solid #fff;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 0.85rem;
    color: #1a1a1a;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.3);
    transition: all 0.2s;
    z-index: 10;
    letter-spacing: 0.5px;
    text-align: center;
    line-height: 1.2;
  }

  .center-btn:hover:not(:disabled) {
    transform: scale(1.08);
    box-shadow: 0 6px 25px rgba(245,197,24,0.6);
  }

  .center-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
  }

  /* WINNER DISPLAY */
  .winner-display {
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .winner-label {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .winner-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.5rem, 3vw, 2.2rem);
    font-weight: 900;
    color: var(--amarillo);
    text-shadow: 0 0 30px rgba(245,197,24,0.8);
    animation: winnerPulse 1s ease-in-out infinite alternate;
    display: none;
  }

  .winner-name.show { display: block; }

  @keyframes winnerPulse {
    from { text-shadow: 0 0 20px rgba(245,197,24,0.5); transform: scale(1); }
    to { text-shadow: 0 0 40px rgba(245,197,24,1); transform: scale(1.04); }
  }

  .winner-emoji {
    font-size: 2rem;
    display: none;
  }
  .winner-emoji.show { display: block; }

  /* PANEL DERECHO */
  .panel {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 24px;
    backdrop-filter: blur(10px);
    position: sticky;
    top: 20px;
  }

  .panel h2 {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    color: var(--amarillo);
    margin-bottom: 6px;
    text-align: center;
  }

  .panel-subtitle {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    text-align: center;
    margin-bottom: 16px;
  }

  .name-count {
    display: inline-block;
    background: var(--verde-oscuro);
    border: 1px solid var(--verde);
    border-radius: 20px;
    padding: 2px 12px;
    font-size: 0.8rem;
    color: #7dff8a;
    margin-bottom: 14px;
    text-align: center;
    width: 100%;
  }

  .input-area {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .input-area input {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-area input:focus {
    border-color: var(--amarillo);
  }

  .input-area input::placeholder { color: rgba(255,255,255,0.3); }

  .btn-add {
    background: linear-gradient(135deg, var(--verde), var(--verde-oscuro));
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 10px 16px;
    color: white;
    cursor: pointer;
    font-size: 1.2rem;
    font-weight: 700;
    transition: all 0.2s;
  }

  .btn-add:hover { background: linear-gradient(135deg, #3d9e4d, var(--verde)); transform: scale(1.05); }

  .names-list {
    max-height: 350px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
    padding-right: 4px;
  }

  .names-list::-webkit-scrollbar { width: 4px; }
  .names-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
  .names-list::-webkit-scrollbar-thumb { background: rgba(245,197,24,0.4); border-radius: 4px; }

  .name-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 8px 12px;
    transition: all 0.2s;
    animation: slideIn 0.2s ease;
  }

  .name-item:hover { background: rgba(255,255,255,0.1); }

  .name-item.winner-item {
    background: rgba(245,197,24,0.15);
    border-color: rgba(245,197,24,0.4);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .name-num {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.4);
    min-width: 22px;
    font-weight: 700;
  }

  .name-text {
    flex: 1;
    font-size: 0.9rem;
    font-weight: 600;
  }

  .btn-remove {
    background: none;
    border: none;
    color: rgba(255,80,80,0.6);
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 6px;
    border-radius: 4px;
    transition: all 0.2s;
    line-height: 1;
  }

  .btn-remove:hover { color: #ff5050; background: rgba(255,80,80,0.1); }

  .btn-clear {
    width: 100%;
    background: rgba(255,80,80,0.1);
    border: 1px solid rgba(255,80,80,0.3);
    border-radius: 8px;
    padding: 10px;
    color: #ff9090;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    transition: all 0.2s;
  }

  .btn-clear:hover { background: rgba(255,80,80,0.2); color: #ffb0b0; }

  .empty-msg {
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 0.85rem;
    padding: 30px 0;
    font-style: italic;
  }

  /* Paste area */
  .paste-area {
    margin-bottom: 14px;
  }

  .paste-label {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    margin-bottom: 6px;
    display: block;
  }

  .paste-area textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 10px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 0.8rem;
    resize: vertical;
    min-height: 70px;
    outline: none;
  }

  .paste-area textarea:focus { border-color: var(--amarillo); }
  .paste-area textarea::placeholder { color: rgba(255,255,255,0.25); }

  .btn-paste {
    width: 100%;
    background: linear-gradient(135deg, var(--azul-claro), var(--azul));
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 9px;
    color: white;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    margin-top: 6px;
    transition: all 0.2s;
  }

  .btn-paste:hover { background: linear-gradient(135deg, #3a6fc0, var(--azul-claro)); }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: confettiFall linear forwards;
    border-radius: 2px;
    z-index: 1000;
    pointer-events: none;
  }

  @keyframes confettiFall {
    to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .main-layout {
      grid-template-columns: 1fr;
    }
    .roulette-outer { width: 340px; height: 340px; }
    .panel { position: static; }
  }
</style>
</head>

  <div class="main-layout">
    <!-- RULETA -->
    <div class="roulette-section">
      <div class="roulette-wrapper">
        <div class="roulette-outer">
          <canvas id="rouletteCanvas" width="464" height="464"></canvas>
        </div>
        <div class="pointer"></div>
        <button class="center-btn" id="spinBtn" onclick="spinWheel()">¡GIRAR!</button>
      </div>

      <div class="winner-display">
        <div class="winner-label" id="winnerLabel" style="display:none">🏆 Estudiante Seleccionado</div>
        <div class="winner-emoji" id="winnerEmoji">🎉</div>
        <div class="winner-name" id="winnerName"></div>
      </div>
    </div>

    <!-- PANEL DE NOMBRES -->
    <div class="panel">
      <h2>📋 Lista de Estudiantes</h2>
      <p class="panel-subtitle">Agrega hasta 40 nombres</p>
      <div class="name-count" id="nameCount">0 / 40 estudiantes</div>

      <div class="input-area">
        <input type="text" id="nameInput" placeholder="Nombre del estudiante..." maxlength="40" 
               onkeydown="if(event.key==='Enter') addName()">
        <button class="btn-add" onclick="addName()" title="Agregar">+</button>
      </div>

      <div class="paste-area">
        <span class="paste-label">📥 Pegar lista (un nombre por línea):</span>
        <textarea id="pasteInput" placeholder="Nombre 1&#10;Nombre 2&#10;Nombre 3&#10;..."></textarea>
        <button class="btn-paste" onclick="pasteNames()">Importar Lista</button>
      </div>

      <div class="names-list" id="namesList">
        <div class="empty-msg">No hay estudiantes aún.<br>¡Agrega nombres para comenzar!</div>
      </div>

      <button class="btn-clear" onclick="clearAll()">🗑️ Limpiar todo</button>
    </div>
  </div>
</div>

<script>
  let names = [];
  let isSpinning = false;
  let currentAngle = 0;
  let lastWinnerIndex = -1;

  const canvas = document.getElementById('rouletteCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const cx = W / 2;
  const cy = H / 2;
  const radius = W / 2 - 4;

  // Colores vibrantes para los sectores
  const colorPalette = [
    ['#1a6b3a', '#2d9955'],
    ['#1a3a6b', '#2a5298'],
    ['#7a1a1a', '#b02020'],
    ['#6b4a1a', '#c4892a'],
    ['#1a5a6b', '#2a8fa0'],
    ['#4a1a6b', '#7a2ab0'],
    ['#1a6b5a', '#2aaa88'],
    ['#6b1a4a', '#b02080'],
  ];

  function getColor(i) {
    return colorPalette[i % colorPalette.length];
  }

  function drawWheel() {
    ctx.clearRect(0, 0, W, H);

    if (names.length === 0) {
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(cx, cy, 10, cx, cy, radius);
      grad.addColorStop(0, '#1a4d24');
      grad.addColorStop(1, '#0a1a0f');
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.strokeStyle = 'rgba(245,197,24,0.4)';
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = 'bold 18px Nunito, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Agrega estudiantes', cx, cy - 12);
      ctx.fillText('para comenzar', cx, cy + 14);
      return;
    }

    const slice = (2 * Math.PI) / names.length;

    for (let i = 0; i < names.length; i++) {
      const startAngle = currentAngle + i * slice;
      const endAngle = startAngle + slice;
      const [c1, c2] = getColor(i);

      // Sector
      const grad = ctx.createRadialGradient(cx, cy, radius * 0.3, cx, cy, radius);
      grad.addColorStop(0, c2);
      grad.addColorStop(1, c1);

      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, radius, startAngle, endAngle);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Texto
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(startAngle + slice / 2);
      ctx.textAlign = 'right';
      ctx.fillStyle = '#ffffff';
      ctx.shadowColor = 'rgba(0,0,0,0.8)';
      ctx.shadowBlur = 4;

      const maxChars = names.length > 20 ? 10 : 18;
      let label = names[i];
      if (label.length > maxChars) label = label.substring(0, maxChars) + '…';

      const fontSize = names.length > 30 ? 9 : names.length > 20 ? 11 : names.length > 10 ? 13 : 15;
      ctx.font = `bold ${fontSize}px Nunito, sans-serif`;
      ctx.fillText(label, radius - 12, fontSize / 3);
      ctx.restore();
    }

    // Borde dorado exterior
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(245,197,24,0.7)';
    ctx.lineWidth = 4;
    ctx.stroke();

    // Separadores dorados
    for (let i = 0; i < names.length; i++) {
      const angle = currentAngle + i * (2 * Math.PI / names.length);
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(angle) * radius, cy + Math.sin(angle) * radius);
      ctx.strokeStyle = 'rgba(245,197,24,0.5)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Centro dorado
    const centerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 50);
    centerGrad.addColorStop(0, '#fff9d6');
    centerGrad.addColorStop(0.5, '#f5c518');
    centerGrad.addColorStop(1, '#c49000');
    ctx.beginPath();
    ctx.arc(cx, cy, 48, 0, Math.PI * 2);
    ctx.fillStyle = centerGrad;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  function addName(nameVal) {
    if (names.length >= 40) {
      alert('¡Máximo 40 estudiantes!');
      return;
    }
    const input = document.getElementById('nameInput');
    const name = (nameVal || input.value).trim();
    if (!name) return;

    names.push(name);
    input.value = '';
    renderList();
    drawWheel();
  }

  function removeName(i) {
    names.splice(i, 1);
    renderList();
    drawWheel();
    document.getElementById('winnerName').classList.remove('show');
    document.getElementById('winnerEmoji').classList.remove('show');
    document.getElementById('winnerLabel').style.display = 'none';
  }

  function clearAll() {
    if (names.length === 0) return;
    if (confirm('¿Eliminar todos los estudiantes?')) {
      names = [];
      renderList();
      drawWheel();
      document.getElementById('winnerName').classList.remove('show');
      document.getElementById('winnerEmoji').classList.remove('show');
      document.getElementById('winnerLabel').style.display = 'none';
    }
  }

  function pasteNames() {
    const ta = document.getElementById('pasteInput');
    const lines = ta.value.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    let added = 0;
    for (const line of lines) {
      if (names.length >= 40) break;
      names.push(line.substring(0, 40));
      added++;
    }
    ta.value = '';
    renderList();
    drawWheel();
    if (added > 0) {
      const btn = document.querySelector('.btn-paste');
      btn.textContent = `✅ ${added} importados`;
      setTimeout(() => btn.textContent = 'Importar Lista', 2000);
    }
  }

  function renderList() {
    const list = document.getElementById('namesList');
    const count = document.getElementById('nameCount');
    count.textContent = `${names.length} / 40 estudiantes`;

    if (names.length === 0) {
      list.innerHTML = '<div class="empty-msg">No hay estudiantes aún.<br>¡Agrega nombres para comenzar!</div>';
      return;
    }

    list.innerHTML = names.map((n, i) => `
      <div class="name-item ${i === lastWinnerIndex ? 'winner-item' : ''}" id="ni-${i}">
        <span class="name-num">${i + 1}</span>
        <span class="name-text">${escHtml(n)}</span>
        <button class="btn-remove" onclick="removeName(${i})" title="Eliminar">✕</button>
      </div>
    `).join('');
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function spinWheel() {
    if (isSpinning || names.length === 0) {
      if (names.length === 0) alert('¡Agrega estudiantes primero!');
      return;
    }

    isSpinning = true;
    const btn = document.getElementById('spinBtn');
    btn.disabled = true;
    btn.textContent = '...';

    document.getElementById('winnerName').classList.remove('show');
    document.getElementById('winnerEmoji').classList.remove('show');
    document.getElementById('winnerLabel').style.display = 'none';
    lastWinnerIndex = -1;

    // Elegir ganador al azar
    const winnerIdx = Math.floor(Math.random() * names.length);
    const slice = (2 * Math.PI) / names.length;

    // El puntero apunta hacia ARRIBA = ángulo -PI/2 en coordenadas canvas
    // Sector i empieza en: currentAngle + i*slice
    // Centro del sector i: currentAngle + i*slice + slice/2
    // Queremos que el centro del sector ganador quede exactamente en -PI/2
    // => finalAngle + winnerIdx*slice + slice/2 = -PI/2  (mod 2PI)
    // => finalAngle = -PI/2 - winnerIdx*slice - slice/2
    const pointerAngle = -Math.PI / 2;
    const targetFinalAngle = pointerAngle - winnerIdx * slice - slice / 2;

    // Diferencia desde el ángulo actual al ángulo destino (siempre positiva, gira en sentido horario)
    let angleDiff = (targetFinalAngle - currentAngle) % (2 * Math.PI);
    if (angleDiff < 0) angleDiff += 2 * Math.PI;

    // Añadir vueltas extra para que el giro sea vistoso
    const extraSpins = (6 + Math.floor(Math.random() * 5)) * 2 * Math.PI;
    const totalRotation = extraSpins + angleDiff;

    const duration = 4000 + Math.random() * 2000;
    const startTime = performance.now();
    const startAngle = currentAngle;

    function easeOut(t) {
      return 1 - Math.pow(1 - t, 4);
    }

    function animate(now) {
      const elapsed = now - startTime;
      const t = Math.min(elapsed / duration, 1);
      currentAngle = startAngle + totalRotation * easeOut(t);
      drawWheel();

      if (t < 1) {
        requestAnimationFrame(animate);
      } else {
        // Fijar el ángulo exacto para que el ganador quede perfectamente bajo la flecha
        currentAngle = targetFinalAngle;
        drawWheel();
        isSpinning = false;
        btn.disabled = false;
        btn.textContent = '¡GIRAR!';
        lastWinnerIndex = winnerIdx;
        renderList();
        showWinner(names[winnerIdx]);
      }
    }

    requestAnimationFrame(animate);
  }

  function showWinner(name) {
    const wn = document.getElementById('winnerName');
    const we = document.getElementById('winnerEmoji');
    const wl = document.getElementById('winnerLabel');
    wn.textContent = name;
    wn.classList.add('show');
    we.classList.add('show');
    wl.style.display = 'block';
    throwConfetti();

    // Scroll
    document.getElementById('winnerName').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function throwConfetti() {
    const colors = ['#f5c518', '#2d9955', '#2a5298', '#ff6b6b', '#a855f7', '#06b6d4', '#f97316'];
    for (let i = 0; i < 80; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.width = (6 + Math.random() * 8) + 'px';
        el.style.height = (6 + Math.random() * 8) + 'px';
        el.style.animationDuration = (2 + Math.random() * 3) + 's';
        el.style.animationDelay = Math.random() * 0.5 + 's';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
      }, i * 30);
    }
  }

  // Init
  drawWheel();
</script>
</body>
</html>
