<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Travesía por el Gran Sinú</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Nunito',sans-serif}

/* ══ SETUP ══ */
#setup{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 40%,#0d3b1a,#071a0c);z-index:50}
.sbox{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);
  border-radius:28px;padding:30px;max-width:460px;width:90%;
  backdrop-filter:blur(16px);text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.7)}
.stitle{font-family:'Fredoka One',cursive;font-size:1.75rem;color:#fdcb6e;
  text-shadow:0 0 30px rgba(253,203,110,.5),2px 2px 0 #5d4037;margin-bottom:4px}
.ssub{color:#81d4fa;font-size:.78rem;letter-spacing:2px;margin-bottom:20px}
.nrow{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.nbtn{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.2);color:white;
  border-radius:12px;padding:7px 18px;font-family:'Fredoka One',cursive;font-size:.92rem;cursor:pointer;transition:all .2s}
.nbtn.on{background:#fdcb6e;color:#222;border-color:#fdcb6e}
.prow{display:flex;align-items:center;gap:8px;margin:7px 0;justify-content:center}
.prow span{font-size:1.6rem}
.prow input{border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);
  border-radius:10px;padding:7px 12px;color:white;font-size:.9rem;font-family:'Nunito',sans-serif;width:155px}
.prow input::placeholder{color:rgba(255,255,255,.3)}
.gobtn{background:linear-gradient(135deg,#fdcb6e,#e17055);color:#1a1a1a;border:none;
  border-radius:16px;padding:12px 44px;font-size:1.1rem;font-family:'Fredoka One',cursive;
  cursor:pointer;margin-top:16px;box-shadow:0 8px 24px rgba(253,203,110,.4);transition:transform .15s}
.gobtn:hover{transform:scale(1.05)}

/* ══ GAME ══ */
#game{position:fixed;inset:0;display:none;overflow:hidden}
#board-img{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;display:block;z-index:1}
#overlay{position:absolute;inset:0;z-index:2;pointer-events:none}

.cnum{
  position:absolute;transform:translate(-50%,-50%);font-family:'Fredoka One',cursive;
  color:white;line-height:1;pointer-events:none;z-index:5;
  text-shadow:-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000,2px 2px 0 #000,0 0 10px rgba(0,0,0,.9);
}
.cnum.dark{
  color:#1a0a00;
  text-shadow:-1px -1px 0 rgba(255,200,100,.7),1px -1px 0 rgba(255,200,100,.7),
    -1px 1px 0 rgba(255,200,100,.7),1px 1px 0 rgba(255,200,100,.7);
}

.cglow{
  position:absolute;transform:translate(-50%,-50%);border-radius:50%;
  pointer-events:none;z-index:4;background:transparent;transition:all .15s;
}
.cglow.lit{
  background:rgba(255,255,0,.3);box-shadow:0 0 0 4px #FFD700,0 0 22px 8px rgba(255,215,0,.65);
  animation:gpop .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes gpop{from{transform:translate(-50%,-50%)scale(2)}to{transform:translate(-50%,-50%)scale(1)}}

/* ══ 3D PIECE ══ */
.piece{
  position:absolute;transform:translate(-50%,-100%);
  display:flex;flex-direction:column;align-items:center;pointer-events:none;z-index:20;
}
.p-lbl{
  font-family:'Fredoka One',cursive;background:rgba(0,0,0,.85);color:#fff;
  border-radius:6px;padding:2px 7px;white-space:nowrap;margin-bottom:3px;border:1px solid rgba(255,255,255,.25);
}
.p-ball{
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  box-shadow:inset -5px -6px 14px rgba(0,0,0,.45),inset 4px 4px 10px rgba(255,255,255,.5),
    0 8px 22px rgba(0,0,0,.7),0 0 0 3px rgba(255,255,255,.35);
}
.p-ball::after{display:none;}
.p-base{border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.4);margin-top:2px}
.p-shad{border-radius:50%;background:rgba(0,0,0,.28);filter:blur(4px);margin-top:1px}
.piece.hop{animation:phop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes phop{
  0%{transform:translate(-50%,-100%)scale(1)}
  35%{transform:translate(-50%,-170%)scale(1.22)}
  70%{transform:translate(-50%,-118%)scale(1.07)}
  100%{transform:translate(-50%,-100%)scale(1)}
}

/* ══ FLOATING UI ══ */
#pf{position:fixed;top:10px;left:10px;display:flex;flex-direction:column;gap:5px;z-index:40}
.pcard{background:rgba(0,0,0,.82);border:2px solid rgba(255,255,255,.12);
  border-left:4px solid #555;border-radius:12px;padding:7px 10px;
  display:flex;align-items:center;gap:8px;backdrop-filter:blur(12px);transition:all .3s;min-width:130px}
.pcard.cur{border-color:#fdcb6e !important;background:rgba(40,28,0,.9);
  box-shadow:0 0 16px rgba(253,203,110,.4);transform:scale(1.05)}
.pa{font-size:1.85rem;line-height:1;filter:drop-shadow(0 3px 6px rgba(0,0,0,.6))}
.pn{font-family:'Fredoka One',cursive;font-size:.82rem;color:white}
.pp{font-size:.68rem;color:#aaa}
.ps{font-size:.62rem;color:#fdcb6e;min-height:12px}

#cf{position:fixed;bottom:12px;right:12px;z-index:40;display:flex;flex-direction:column;gap:7px;width:128px}
.tbox{background:rgba(0,0,0,.85);border:1.5px solid rgba(253,203,110,.5);
  border-radius:10px;padding:7px;text-align:center;font-size:.75rem;font-weight:700;
  color:#fdcb6e;line-height:1.4;backdrop-filter:blur(12px)}
.dbox{background:rgba(0,0,0,.85);border:1.5px solid rgba(255,255,255,.14);
  border-radius:12px;padding:10px 8px;text-align:center;backdrop-filter:blur(12px)}
.dbox h3{font-family:'Fredoka One',cursive;color:#fdcb6e;font-size:.83rem;margin-bottom:7px}
.dr{display:flex;justify-content:center;gap:8px;margin:5px 0}
.die{width:46px;height:46px;background:white;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka One',cursive;font-size:1.65rem;color:#333;
  box-shadow:3px 4px 0 #555,inset 0 2px 3px rgba(0,0,0,.1);border:2px solid #ddd;position:relative}
.die::after{content:'';position:absolute;top:3px;left:3px;right:3px;height:36%;
  background:linear-gradient(180deg,rgba(255,255,255,.65),transparent);border-radius:7px 7px 0 0}
.die.spin{animation:ds .5s ease}
@keyframes ds{0%{transform:rotate(0)scale(1)}25%{transform:rotate(-22deg)scale(1.2)}
  50%{transform:rotate(18deg)scale(1.15)}75%{transform:rotate(-8deg)scale(1.05)}100%{transform:rotate(0)scale(1)}}
.dtot{font-size:.8rem;color:#aaa;font-weight:800;margin:3px 0}
.rbtn{background:linear-gradient(135deg,#e17055,#d63031);color:white;border:none;
  border-radius:10px;padding:11px 0;width:100%;font-family:'Fredoka One',cursive;
  font-size:.98rem;cursor:pointer;box-shadow:0 4px 12px rgba(214,48,49,.4);
  transition:transform .15s;margin-top:2px}
.rbtn:hover:not(:disabled){transform:scale(1.04)}
.rbtn:disabled{opacity:.4;cursor:not-allowed}

/* ══ MODAL ══ */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);
  z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(5px)}
.modal-bg.on{display:flex}
.mbox{background:linear-gradient(160deg,#152215,#0d1a0d);border-radius:24px;padding:26px;
  max-width:430px;width:100%;text-align:center;
  box-shadow:0 40px 100px rgba(0,0,0,.9);animation:mi .3s cubic-bezier(.34,1.56,.64,1);
  border:2px solid rgba(255,255,255,.1);color:white}
@keyframes mi{from{transform:scale(.55)translateY(20px);opacity:0}to{transform:scale(1);opacity:1}}
.mtag{font-family:'Fredoka One',cursive;font-size:.83rem;letter-spacing:3px;
  text-transform:uppercase;margin-bottom:5px}
.mtag.R{color:#ff7675}.mtag.Y{color:#fdcb6e}.mtag.G{color:#55efc4}.mtag.BR{color:#e9a84c}
.mic{font-size:3.4rem;margin:5px 0}
.mq{background:rgba(255,255,255,.07);border-radius:14px;padding:14px;font-size:.98rem;
  font-weight:700;line-height:1.55;margin:11px 0;border:1px solid rgba(255,255,255,.1)}
.mbtns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.mb{border:none;border-radius:12px;padding:10px 18px;font-family:'Fredoka One',cursive;
  font-size:.92rem;cursor:pointer;transition:transform .15s}
.mb:hover{transform:scale(1.06)}
.mb-ok{background:linear-gradient(135deg,#00b894,#00cec9);color:white}
.mb-opt{background:rgba(255,255,255,.1);color:white;border:1.5px solid rgba(255,255,255,.25);
  width:100%;text-align:left;padding:10px 14px;margin:3px 0;border-radius:10px;
  font-family:'Fredoka One',cursive;font-size:.88rem;cursor:pointer;transition:all .2s;line-height:1.3}
.mb-opt:hover:not(:disabled){background:rgba(255,255,255,.22);transform:scale(1.02)}
.mb-opt:disabled{cursor:not-allowed}

/* ══ WINNER ══ */
#winner{display:none;position:fixed;inset:0;
  background:radial-gradient(ellipse at 50% 40%,#0d3b1a,#071a0c);
  flex-direction:column;align-items:center;justify-content:center;z-index:300}
.wbox{background:rgba(253,203,110,.1);border:3px solid #fdcb6e;border-radius:28px;
  padding:42px 34px;max-width:450px;width:90%;text-align:center;box-shadow:0 40px 80px rgba(0,0,0,.7)}
.wtitle{font-family:'Fredoka One',cursive;font-size:2.7rem;color:#fdcb6e}
.wava{font-size:5rem;margin:8px 0}
.wname{font-size:1.75rem;font-weight:900;color:white;margin:8px 0}
.wbtn{background:linear-gradient(135deg,#fdcb6e,#e17055);color:#1a1a1a;border:none;
  border-radius:16px;padding:12px 44px;font-family:'Fredoka One',cursive;font-size:1.1rem;
  cursor:pointer;margin-top:18px}
.confetti{position:fixed;pointer-events:none;z-index:500;animation:cf linear forwards}
@keyframes cf{0%{transform:translateY(-20px)rotate(0);opacity:1}100%{transform:translateY(110vh)rotate(800deg);opacity:0}}
</style>
</head>
<body>

<div id="setup">
  <div class="sbox">
    <div class="stitle">🌊 TRAVESÍA POR EL GRAN SINÚ</div>
    <div class="ssub">JUEGO DE CÓRDOBA · ENSAS TIERRALTA</div>
    <div class="nrow">
      <button class="nbtn on" onclick="selN(2,this)">2 jugadores</button>
      <button class="nbtn" onclick="selN(3,this)">3 jugadores</button>
      <button class="nbtn" onclick="selN(4,this)">4 jugadores</button>
      <button class="nbtn" onclick="selN(5,this)">5 jugadores</button>
    </div>
    <div id="pnames"></div>
    <button class="gobtn" onclick="startGame()">🚀 ¡Comenzar Aventura!</button>
  </div>
</div>

posición de autoridad']},{q:'¿Qué cordillera atraviesa el Parque Nacional Natural Paramillo?',a:'La Cordillera Occidental',ops:['La Cordillera Oriental','La Cordillera Central','La Cordillera Occidental','La Sierra Nevada']},{q:'¿Qué pez es uno de los más representativos del Río Sinú?',a:'El bocachico',ops:['La trucha','El salmón','El bocachico','El bagre rayado']},{q:'¿Cuál es la principal actividad económica rural en el Alto Sinú?',a:'La agricultura y la ganadería',ops:['La minería y el turismo','La pesca industrial','La agricultura y la ganadería','La manufactura textil']},{q:'¿Cómo se llama la bebida tradicional que se prepara con maíz en nuestra región?',a:'La chicha de maíz',ops:['El aguardiente de caña','La chicha de maíz','El guarapo de panela','El masato de arroz']},{q:'¿Cuál es el nombre del valle por donde pasa el Río Sinú?',a:'El Valle del Sinú',ops:['El Valle del Cauca','El Valle del Magdalena','El Valle del Sinú','El Valle de Aburrá']},{q:'¿Qué animal silvestre representativo habita en el Parque Paramillo?',a:'El jaguar',ops:['El oso de anteojos','El jaguar','El cóndor andino','La danta']},{q:'¿Qué recurso natural nos proporciona el río y es vital para la vida?',a:'El agua',ops:['El petróleo','El carbón mineral','El agua','El gas natural']},{q:'¿Cómo se llama el embalse que se forma con la represa de Urrá?',a:'Embalse de Urrá',ops:['Embalse del Peñol','Embalse de La Miel','Embalse de Urrá','Embalse de Calima']},{q:'¿Qué valor es fundamental para convivir en comunidad en Tierralta?',a:'El respeto',ops:['La competencia','El individualismo','El respeto','La envidia']},{q:'¿Cómo se llama el instrumento musical tradicional de cuerdas muy popular en el Caribe colombiano?',a:'El acordeón',ops:['La guitarra','La flauta traversa','El acordeón','El violín']}];

za 4 casillas.',e:'move',v:4,i:'🌲'},{t:'Lluvia Tropical',d:'La tormenta te obligó a refugiarte. Pierde 1 turno.',e:'skip',v:1,i:'⛈️'},{t:'Espíritu del Alto Sinú',d:'La comunidad te anima a seguir. La próxima trampa no te afectará.',e:'shield',v:0,i:'✨'}];

let numP=2,players=[],curP=0,busy=false;
let shielded={},waitEven={},skipNext={},waitTurns={};

function toScreen(n){ const [xp,yp]=PATH[n-1]; return [window.innerWidth*xp/100, window.innerHeight*yp/100]; }
function cellSz(){ return Math.min(window.innerWidth,window.innerHeight)*0.048; }

function selN(n,btn){
  numP=n; document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); buildNames();
}
function buildNames(){
  const d=document.getElementById('pnames');d.innerHTML='';
  for(let i=0;i<numP;i++){
    d.innerHTML+=`<div class="prow"><span>${PCFG[i].emoji}</span>
      <input type="text" id="pn${i}" placeholder="${PCFG[i].label}" maxlength="12"></div>`;
  }
}
buildNames();

function startGame(){
  // ══ DETENER música de intro cuando comienza el juego ══
  sndIntro.pause();
  sndIntro.currentTime = 0;
  // Quitar listeners por si el juego arranca antes del primer clic en el setup
  document.removeEventListener('click',     _tryPlayIntro);
  document.removeEventListener('touchstart', _tryPlayIntro);

  players=[];
  for(let i=0;i<numP;i++){
    const v=document.getElementById('pn'+i).value.trim()||PCFG[i].label;
    players.push({ name:v, emoji:PCFG[i].emoji, bg:PCFG[i].bg, bg2:PCFG[i].bg2, img:PCFG[i].img, snd:PCFG[i].snd, pos:1 });
    shielded[i]=false;waitEven[i]=false;skipNext[i]=false;waitTurns[i]=0;
  }
  document.getElementById('setup').style.display='none'; document.getElementById('game').style.display='block';
  buildOverlay(); buildPieces(); renderPlayers(); updateTurn();
  window.addEventListener('resize',()=>{buildOverlay();repositionPieces();});
}

function buildOverlay(){
  const ov=document.getElementById('overlay');ov.innerHTML='';
  const cs=cellSz(), fs=Math.round(cs*0.68);
  for(let n=1;n<=TOTAL;n++){
    const [px,py]=toScreen(n); const col=COLORS[n-1];
    const g=document.createElement('div'); g.className='cglow';g.id='cg'+n;
    g.style.cssText=`left:${px}px;top:${py}px;width:${cs}px;height:${cs}px;`; ov.appendChild(g);
    const lbl=document.createElement('div'); lbl.className='cnum'+(col==='BR'?' dark':''); lbl.id='cn'+n;
    lbl.textContent=n; lbl.style.cssText=`left:${px}px;top:${py}px;font-size:${fs}px;`; ov.appendChild(lbl);
  }
}

const PELS={}; const OFF=[[0,0],[16,0],[-12,10],[12,10],[0,14]];
function buildPieces(){
  const ov=document.getElementById('overlay'); const cs=cellSz(),bs=Math.round(cs*1.2);
  players.forEach((pl,i)=>{
    const div=document.createElement('div'); div.className='piece';div.id='p'+i;
    div.innerHTML=`
      <div class="p-lbl" style="font-size:${Math.round(bs*.28)}px">${pl.name.substring(0,10)}</div>
      <div class="p-ball" style="width:${bs}px;height:${bs}px; background:radial-gradient(circle at 32% 28%,${pl.bg2},${pl.bg}); border:2px solid ${pl.bg}">
        <img src="${pl.img}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" style="width:100%;height:100%;object-fit:cover;border-radius:50%; z-index:10;">
        <span style="display:none; font-size:${Math.round(bs*.62)}px; position:absolute; z-index:1;">${pl.emoji}</span>
      </div>
      <div class="p-base" style="width:${Math.round(bs*.72)}px;height:${Math.round(bs*.16)}px;background:radial-gradient(ellipse,${pl.bg2},${pl.bg})"></div>
      <div class="p-shad" style="width:${Math.round(bs*.55)}px;height:${Math.round(bs*.12)}px"></div>`;
    ov.appendChild(div);PELS[i]=div;
  });
  repositionPieces();
}

function repositionPieces(){
  players.forEach((pl,i)=>{
    const [px,py]=toScreen(pl.pos); const same=players.filter((p,j)=>p.pos===pl.pos&&j<i).length;
    const [ox,oy]=OFF[same]||[0,0]; PELS[i].style.left=(px+ox)+'px'; PELS[i].style.top=(py+oy)+'px';
  });
}

function animTo(idx,from,to,cb){
  if(from===to){cb();return;}
  const dir=from<to?1:-1; let cur=from;
  const step=()=>{
    cur+=dir; players[idx].pos=cur;
    const [px,py]=toScreen(cur); const same=players.filter((p,j)=>p.pos===cur&&j<idx).length;
    const [ox,oy]=OFF[same]||[0,0]; const el=PELS[idx]; el.style.left=(px+ox)+'px'; el.style.top=(py+oy)+'px';
    el.classList.remove('hop');void el.offsetWidth;el.classList.add('hop');
    document.querySelectorAll('.cglow.lit').forEach(c=>c.classList.remove('lit'));
    const cg=document.getElementById('cg'+cur); if(cg)cg.classList.add('lit');
    renderPlayers(); if(cur===to)setTimeout(cb,360); else setTimeout(step,240);
  }; step();
}

function renderPlayers(){
  const p=document.getElementById('pf');p.innerHTML='';
  players.forEach((pl,i)=>{
    let st=''; if(shielded[i])st+='🛡️ '; if(waitEven[i])st+='⚡par '; if(waitTurns[i]>0)st+=`⏸️${waitTurns[i]}t `; if(skipNext[i])st+='😴';
    const d=document.createElement('div'); d.className='pcard'+(i===curP?' cur':''); d.style.borderLeftColor=pl.bg;
    d.innerHTML=`<div class="pa">${pl.emoji}</div><div><div class="pn" style="color:${pl.bg}">${pl.name}</div><div class="pp">Casilla ${pl.pos}/${TOTAL}</div><div class="ps">${st}</div></div>`;
    p.appendChild(d);
  });
}
function updateTurn(){ const pl=players[curP]; document.getElementById('tbox').innerHTML=`${pl.emoji}<br><strong style="color:${pl.bg}">${pl.name}</strong>`; }

function rollDice(){
  if(busy)return;busy=true;
  playAudioSafe(sndDice);
  document.getElementById('rbtn').disabled=true;
  const d1=document.getElementById('d1'),d2=document.getElementById('d2');
  d1.classList.add('spin');d2.classList.add('spin'); let f=0;
  const iv=setInterval(()=>{
    d1.textContent=Math.ceil(Math.random()*6); d2.textContent=Math.ceil(Math.random()*6);
    if(++f>=13){
      clearInterval(iv); const v1=Math.ceil(Math.random()*6),v2=Math.ceil(Math.random()*6);
      d1.textContent=v1;d2.textContent=v2; d1.classList.remove('spin');d2.classList.remove('spin');
      document.getElementById('dtot').textContent=`Total: ${v1+v2}`; processTurn(v1,v2);
    }
  },65);
}

function processTurn(v1,v2){
  const pl=players[curP],total=v1+v2;
  if(waitEven[curP]){ if(total%2!==0){ showInfo('😔','Necesitas número par','El sueño del sancocho aún te tiene atrapado.',()=>endTurn()); return; } waitEven[curP]=false; }
  if(skipNext[curP]){ skipNext[curP]=false; showInfo('😴','Turno perdido','Sigues durmiendo bajo el mango.',()=>endTurn()); return; }
  if(waitTurns[curP]>0){ waitTurns[curP]--; showInfo('⏸️','Turno perdido',`Todavía estás atascado. Quedan ${waitTurns[curP]} turno(s).`,()=>endTurn()); return; }
  const to=Math.min(pl.pos+total,TOTAL);
  animTo(curP,pl.pos,to,()=>{ if(to>=TOTAL){showWinner();return;} checkSquare(curP,to); });
}

function checkSquare(idx,pos){
  const col=COLORS[pos-1];
  if(pos === 7 || pos === 10 || pos === 33) {
    playAudioSafe(sndWater);
  } else if(pos === 35) {
    playAudioSafe(sndJungle);
  } else if(pos === 37) {
    playAudioSafe(sndCity);
  } else {
    playAudioSafe(players[idx].snd);
  }

  if(pos===10){ openM('BR','⚡','⚡ REPRESA DE URRÁ','¡La energía de la represa te impulsa! Salta a la casilla 25.',`<button class="mb mb-ok" onclick="doJump(${idx},25)">⚡ ¡Saltar!</button>`); return; }
  if(pos===28){ openM('BR','🌿','🌿 CIÉNAGAS DEL SINÚ','¡Te perdiste en las ciénagas! Pierdes el turno.',`<button class="mb mb-ok" onclick="closeM();endTurn()">😔 Aceptar</button>`); return; }
  
  if(col==='R') showQ('R',idx); else if(col==='Y') showQ('Y',idx); else if(col==='G') showGreen(idx); else endTurn();
}

function doJump(idx,target){ closeM(); animTo(idx,players[idx].pos,target,()=>endTurn()); }

function showQ(color,idx){
  const qs=color==='R'?RQ:YQ; const q=qs[Math.floor(Math.random()*qs.length)];
  const tag=color==='R'?'🌌 PREGUNTA DEL UNIVERSO':'🌿 PREGUNTA DEL CONTEXTO'; const icon=color==='R'?'🪐':'🌱';
  const opts=[...q.ops].sort(()=>Math.random()-.5);
  const btns=opts.map(op=>{
    const correct=op===q.a; return `<button class="mb mb-opt" onclick="ansOk(${idx},${correct},'${op.replace(/'/g,"\'")}','${q.a.replace(/'/g,"\'")}',this)">${op}</button>`;
  }).join('');
  openM(color,icon,tag,q.q,btns);
}

function ansOk(idx,correct,chosen,rightAns,btn){
  document.querySelectorAll('.mb-opt').forEach(b=>{ b.disabled=true; b.style.opacity='0.5'; });
  if(correct){
    btn.style.background='linear-gradient(135deg,#27ae60,#1e8449)'; btn.style.color='white'; btn.style.opacity='1'; btn.textContent='✅ '+chosen+' — ¡Correcto! +2 casillas';
    setTimeout(()=>{ closeM(); const to=Math.min(players[idx].pos+2,TOTAL); animTo(idx,players[idx].pos,to,()=>{if(to>=TOTAL)showWinner();else endTurn();}); },1200);
  }else{
    btn.style.background='linear-gradient(135deg,#d63031,#c0392b)'; btn.style.color='white'; btn.style.opacity='1'; btn.textContent='❌ '+chosen+' — Incorrecto';
    document.querySelectorAll('.mb-opt').forEach(b=>{ if(b.textContent.includes(rightAns)||b.dataset.ans===rightAns){ b.style.background='linear-gradient(135deg,#27ae60,#1e8449)'; b.style.color='white';b.style.opacity='1'; b.textContent='✅ '+rightAns+' — Correcta'; } });
    setTimeout(()=>{ closeM(); const to=Math.max(players[idx].pos-1,1); animTo(idx,players[idx].pos,to,()=>endTurn()); },1800);
  }
}

function showGreen(idx){
  const c=GC[Math.floor(Math.random()*GC.length)];
  const neg=['move','skip','skip_next','wait_even'].includes(c.e)&&c.v<=0;
  if(shielded[idx]&&neg){shielded[idx]=false;renderPlayers();endTurn();return;}
  openM('G',c.i,`🎲 ${c.t}`,c.d,`<button class="mb mb-ok" onclick="applyC(${idx},'${c.e}',${c.v})">✔️ Aceptar</button>`);
}
function applyC(idx,e,v){
  closeM(); const pl=players[idx];
  if(e==='move'){ const to=Math.max(1,Math.min(pl.pos+v,TOTAL)); animTo(idx,pl.pos,to,()=>{if(to>=TOTAL)showWinner();else endTurn();});
  }else if(e==='skip'){ waitTurns[idx]=v;endTurn(); }else if(e==='skip_next'){ skipNext[idx]=true;endTurn();
  }else if(e==='wait_even'){ waitEven[idx]=true;endTurn(); }else if(e==='roll_again'){ busy=false;document.getElementById('rbtn').disabled=false;
  }else if(e==='shield'){ shielded[idx]=true;renderPlayers();endTurn(); }
}

function openM(col,icon,tag,q,btns){
  document.getElementById('mtag').className=`mtag ${col}`; document.getElementById('mtag').textContent=tag;
  document.getElementById('mic').textContent=icon; document.getElementById('mq').textContent=q;
  document.getElementById('mbtns').innerHTML=btns; document.getElementById('modal').classList.add('on');
}
function closeM(){document.getElementById('modal').classList.remove('on');}
function showInfo(icon,tag,msg,cb){ openM('BR',icon,tag,msg,`<button class="mb mb-ok" onclick="closeM();(${cb})()">👍 OK</button>`); }

function endTurn(){ busy=false; curP=(curP+1)%players.length; renderPlayers();updateTurn(); document.getElementById('rbtn').disabled=false; }

function showWinner(){
  // ══ REANUDAR música de intro en la pantalla de ganador ══
  sndIntro.currentTime = 0;
  playAudioSafe(sndIntro);

  const pl=players[curP]; document.getElementById('game').style.display='none'; document.getElementById('winner').style.display='flex';
  document.getElementById('wav').textContent=pl.emoji; document.getElementById('wnm').textContent=pl.name;
  const cols=['#fdcb6e','#e17055','#00b894','#74b9ff','#fd79a8','#a29bfe'];
  for(let i=0;i<110;i++){
    const d=document.createElement('div');d.className='confetti';
    d.style.cssText=`left:${Math.random()*100}vw;width:${5+Math.random()*9}px;height:${5+Math.random()*9}px;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${1.8+Math.random()*2.5}s;animation-delay:${Math.random()*1.5}s;border-radius:${Math.random()>.5?'50%':'2px'}`;
    document.body.appendChild(d);setTimeout(()=>d.remove(),5000);
  }
}
</script>
</body>
</html>
