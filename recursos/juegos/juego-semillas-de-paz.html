<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Semillas de Paz — ENSAS Alto Sinú</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:#000;touch-action:none;}
#app{position:fixed;inset:0;width:100vw;height:100vh;}
#tov{position:absolute;inset:0;z-index:9000;pointer-events:none;background:#000;opacity:0;transition:opacity .3s ease;}
#tov.show{opacity:1;}
.SCR{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.SCR.ON{display:flex;}

/* TITULO */
#S0{background:radial-gradient(ellipse 80% 50% at 50% 100%,rgba(20,80,20,.9) 0%,transparent 70%),linear-gradient(180deg,#010a03 0%,#051805 40%,#0a2a0a 100%);align-items:center;justify-content:flex-start;}
#S0::before{content:'';position:absolute;inset:0;background-image:radial-gradient(1px 1px at 10% 15%,rgba(180,255,120,.7) 0%,transparent 100%),radial-gradient(1px 1px at 25% 8%,rgba(255,255,180,.6) 0%,transparent 100%),radial-gradient(1px 1px at 60% 5%,rgba(180,255,120,.5) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 80% 12%,rgba(255,240,120,.6) 0%,transparent 100%),radial-gradient(1px 1px at 45% 20%,rgba(200,255,160,.5) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 15% 35%,rgba(255,255,180,.4) 0%,transparent 100%);animation:twinkle 4s ease-in-out infinite alternate;}
@keyframes twinkle{0%{opacity:.6;}100%{opacity:1;}}
#S0::after{content:'';position:absolute;bottom:0;left:0;right:0;height:45%;background:linear-gradient(180deg,transparent 0%,#0a1e0a 100%);clip-path:polygon(0 40%,8% 20%,18% 35%,30% 15%,42% 30%,55% 10%,68% 28%,80% 12%,92% 25%,100% 18%,100% 100%,0 100%);}
.t0-inner{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;padding-top:8vh;pointer-events:none;width:100%;}
.t0-icon{font-size:clamp(3.5rem,9vw,6rem);filter:drop-shadow(0 0 24px rgba(100,220,80,.8)) drop-shadow(0 0 60px rgba(60,180,60,.4));animation:float 3.5s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}
.t0-title{font-family:'Fredoka One',cursive;font-size:clamp(2.6rem,8vw,5rem);color:#f5c518;margin:8px 0 4px;text-shadow:0 0 40px rgba(245,197,24,.7),0 3px 0 rgba(0,0,0,.5);letter-spacing:2px;}
.t0-sub{font-size:clamp(.6rem,1.8vw,1rem);color:rgba(255,255,255,.45);letter-spacing:5px;text-transform:uppercase;}
.t0-chars{position:absolute;bottom:18vh;left:0;right:0;display:flex;justify-content:center;align-items:flex-end;gap:clamp(2vw,4vw,6vw);z-index:4;pointer-events:none;}
.t0-btns{position:absolute;bottom:4vh;left:50%;transform:translateX(-50%);z-index:6;width:min(420px,88%);display:flex;flex-direction:column;gap:12px;}
.BTN{width:100%;padding:15px 20px;border-radius:50px;border:none;font-family:'Fredoka One',cursive;font-size:clamp(1rem,2.5vw,1.15rem);cursor:pointer;transition:transform .12s,box-shadow .2s,filter .15s;position:relative;overflow:hidden;}
.BTN::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:rgba(255,255,255,.14);pointer-events:none;border-radius:50px 50px 0 0;}
.BTN:active{transform:scale(.95);}
.BTN-gold{background:linear-gradient(145deg,#f9d240,#e88020);color:#1a0600;box-shadow:0 6px 26px rgba(245,197,24,.5);}
.BTN-gold:hover{box-shadow:0 8px 36px rgba(245,197,24,.75);filter:brightness(1.05);}
.BTN-ghost{background:rgba(255,255,255,.07);color:#fff;border:1.5px solid rgba(255,255,255,.2);}

/* AVATAR */
#S1{background:linear-gradient(160deg,#031508,#071a0a);}
.hdr{display:flex;align-items:center;gap:10px;padding:13px 18px;background:rgba(0,0,0,.55);border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;}
.hdr-title{font-family:'Fredoka One',cursive;font-size:clamp(.95rem,2.5vw,1.1rem);color:#fdd87a;}
.back-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;}
.av-body{flex:1;display:flex;gap:16px;padding:14px 18px;overflow:hidden;}
.av-left{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:10px;}
.av-preview{width:clamp(110px,26vw,145px);height:clamp(160px,36vw,205px);background:radial-gradient(ellipse at 50% 95%,rgba(45,140,45,.3),rgba(0,0,0,.8));border-radius:16px;border:2px solid rgba(245,197,24,.35);overflow:hidden;display:flex;align-items:flex-end;justify-content:center;}
.av-name-inp{width:clamp(110px,26vw,145px);font-family:'Fredoka One',cursive;font-size:.9rem;color:#fdd87a;background:rgba(255,255,255,.07);border:1.5px solid rgba(245,197,24,.28);border-radius:12px;padding:8px 10px;outline:none;text-align:center;}
.av-name-inp::placeholder{color:rgba(245,197,24,.4);}
.av-right{flex:1;display:flex;flex-direction:column;gap:9px;overflow-y:auto;}
.av-right::-webkit-scrollbar{display:none;}
.av-label{font-size:.54rem;letter-spacing:3px;text-transform:uppercase;color:#f5c518;opacity:.8;}
.sw-row{display:flex;gap:8px;flex-wrap:wrap;}
.swatch{width:26px;height:26px;border-radius:50%;border:3px solid rgba(255,255,255,.12);cursor:pointer;transition:transform .15s,border-color .15s;}
.swatch.ON{border-color:#f5c518;transform:scale(1.35);}
.opt-row{display:flex;gap:7px;flex-wrap:wrap;}
.opt-chip{padding:5px 12px;border-radius:10px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);font-size:.65rem;font-weight:700;cursor:pointer;transition:all .15s;}
.opt-chip.ON{border-color:#f5c518;color:#f5c518;background:rgba(245,197,24,.12);}

/* MAPA */
#S2{background:#c8a858;}
#mapCanvas{position:absolute;inset:0;width:100%;height:100%;}
.map-hud{position:absolute;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;gap:10px;padding:12px 18px;background:linear-gradient(180deg,rgba(0,0,0,.85),transparent);}
.hud-avatar{width:40px;height:40px;border-radius:10px;border:2px solid #f5c518;overflow:hidden;background:#0a1a0a;flex-shrink:0;display:flex;align-items:flex-end;justify-content:center;}
.hud-name{font-family:'Fredoka One',cursive;font-size:clamp(.88rem,2vw,1rem);color:#fff;}
.hud-level{font-size:clamp(.5rem,1.3vw,.62rem);color:rgba(255,255,255,.42);}
.hud-pts{background:rgba(0,0,0,.6);border:1.5px solid rgba(245,197,24,.42);border-radius:18px;padding:5px 14px;font-family:'Fredoka One',cursive;font-size:clamp(.88rem,2vw,1rem);color:#f5c518;margin-left:auto;}
.map-labels{display:none;}
.map-lbl{position:absolute;transform:translate(-50%,0);font-family:'Fredoka One',cursive;font-size:clamp(.52rem,1.4vw,.65rem);color:#fff;background:rgba(0,0,0,.75);padding:3px 8px;border-radius:8px;white-space:nowrap;}
.dpad{position:absolute;bottom:20px;left:18px;z-index:30;display:grid;grid-template-columns:repeat(3,50px);grid-template-rows:repeat(3,50px);gap:4px;opacity:0;}
.dp-btn{width:50px;height:50px;background:transparent;border:none;border-radius:12px;color:transparent;font-size:1.05rem;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;}
.dp-btn:active,.dp-btn.HELD{background:transparent;}
.enter-btn{position:absolute;bottom:20px;right:18px;z-index:30;display:none;background:transparent;border:none;border-radius:16px;padding:14px 20px;font-family:'Fredoka One',cursive;font-size:.92rem;color:transparent;cursor:pointer;animation:none;box-shadow:none;}

/* MAP IMAGE */
#mapFrame{
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  overflow:hidden;
}
#mapImg{
  position:absolute;
  inset:0;width:100%;height:100%;
  object-fit:cover;
  object-position:center center;
  pointer-events:none;
}
/* Overlay must match image position exactly */
#mapOverlay{
  position:absolute;inset:0;
  pointer-events:none;
}
#mapOverlay{position:absolute;inset:0;pointer-events:none;}

/* Marcadores de lugar en el mapa */
.place-marker{
  position:absolute;
  transform:translate(-50%,-50%);
  z-index:20;
  cursor:pointer;
  pointer-events:all;
  display:flex;flex-direction:column;align-items:center;
  transition:transform .18s ease;
}
.place-marker:hover .pm-ring{transform:scale(1.18);}
.pm-ring{
  width:clamp(42px,5.5vw,62px);height:clamp(42px,5.5vw,62px);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(1.1rem,2.2vw,1.6rem);
  border:3px solid rgba(255,255,255,.7);
  box-shadow:0 3px 18px rgba(0,0,0,.55),0 0 0 3px rgba(255,255,255,.15);
  transition:transform .18s ease,box-shadow .18s ease;
  position:relative;
}
.pm-ring.done{border-color:#4ab44a;box-shadow:0 3px 18px rgba(0,0,0,.55),0 0 0 4px rgba(74,180,74,.4);}
.pm-pulse{
  position:absolute;inset:-6px;border-radius:50%;
  border:3px solid rgba(255,255,255,.35);
  animation:pmPulse 2s ease-out infinite;
}
.pm-pulse.done{border-color:rgba(74,180,74,.6);}
@keyframes pmPulse{0%{transform:scale(.85);opacity:.8;}100%{transform:scale(1.35);opacity:0;}}
.pm-label{
  font-family:'Fredoka One',cursive;
  font-size:clamp(.5rem,1.3vw,.68rem);
  color:#fff;
  background:rgba(0,0,0,.82);
  padding:2px 7px;border-radius:6px;
  margin-top:4px;
  white-space:nowrap;
  border:1px solid rgba(255,255,255,.12);
  text-shadow:0 1px 2px rgba(0,0,0,.8);
  pointer-events:none;
}
.pm-label.done{color:#4ab44a;border-color:rgba(74,180,74,.35);}

/* Tooltip al hover */
.pm-tooltip{
  position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.92);color:#fff;
  font-size:clamp(.52rem,1.3vw,.65rem);
  padding:5px 10px;border-radius:8px;
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .2s;
  border:1px solid rgba(245,197,24,.3);
  font-family:'Nunito',sans-serif;
}
.place-marker:hover .pm-tooltip{opacity:1;}
@keyframes bob{0%{transform:translateY(0);}100%{transform:translateY(-8px);}}
.xp-bar{position:absolute;bottom:0;left:0;right:0;height:5px;background:rgba(255,255,255,.08);}
.xp-fill{height:100%;background:linear-gradient(90deg,#2d8c2d,#f5c518);transition:width .9s cubic-bezier(.34,1.56,.64,1);}
#playerOnMap{position:absolute;z-index:12;pointer-events:none;filter:drop-shadow(0 4px 10px rgba(0,0,0,.9));}

/* ESCENA */
#S3{background:#000;}
.scene-bg{position:absolute;inset:0;overflow:hidden;}
.stage{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;z-index:5;padding-bottom:30%;}
.scene-ui{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;pointer-events:none;}
.scene-hud{display:flex;align-items:center;gap:8px;padding:11px 16px;flex-shrink:0;background:linear-gradient(180deg,rgba(0,0,0,.88),transparent);pointer-events:all;}
.s-hud-av{width:34px;height:34px;border-radius:9px;border:2px solid #f5c518;overflow:hidden;background:#0a1a0a;flex-shrink:0;display:flex;align-items:flex-end;justify-content:center;}
.s-hud-loc{font-family:'Fredoka One',cursive;font-size:clamp(.82rem,2vw,.96rem);color:#fff;}
.s-hud-sub{font-size:clamp(.5rem,1.3vw,.6rem);color:rgba(255,255,255,.38);}
.s-hud-pts{font-family:'Fredoka One',cursive;font-size:clamp(.85rem,2vw,.98rem);color:#f5c518;margin-left:auto;}
.s-hud-close{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.18);color:rgba(255,255,255,.75);font-size:.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;pointer-events:all;}
.stage-area{flex:1;position:relative;}

.dialog-box{pointer-events:all;flex-shrink:0;background:linear-gradient(180deg,rgba(4,12,4,.98),rgba(2,7,2,1));border-top:2px solid rgba(245,197,24,.2);padding:13px 18px 10px;cursor:pointer;min-height:clamp(88px,15vh,115px);position:relative;}
.dialog-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(245,197,24,.45),transparent);}
.d-who{display:flex;align-items:center;gap:9px;margin-bottom:6px;}
.d-avatar{width:28px;height:28px;border-radius:8px;border:1.5px solid #f5c518;overflow:hidden;background:#0a1a0a;flex-shrink:0;display:flex;align-items:flex-end;justify-content:center;}
.d-name{font-family:'Fredoka One',cursive;font-size:clamp(.8rem,2vw,.94rem);color:#f5c518;}
.d-text{font-size:clamp(.72rem,1.9vw,.86rem);color:rgba(255,255,255,.95);line-height:1.75;}
.d-hint{font-size:clamp(.48rem,1.2vw,.58rem);color:rgba(255,255,255,.16);text-align:right;margin-top:4px;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

.choices-box{pointer-events:all;flex-shrink:0;background:rgba(2,7,2,1);border-top:1px solid rgba(245,197,24,.1);padding:9px 14px 12px;display:none;flex-direction:column;gap:7px;}
.choices-title{font-size:.54rem;color:rgba(245,197,24,.4);letter-spacing:3px;text-align:center;margin-bottom:2px;}
.choice-btn{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 14px;cursor:pointer;pointer-events:all;color:rgba(255,255,255,.93);font-size:clamp(.68rem,1.8vw,.82rem);line-height:1.6;display:flex;gap:9px;align-items:flex-start;transition:border-color .2s,background .2s,transform .1s;text-align:left;width:100%;font-family:'Nunito',sans-serif;-webkit-tap-highlight-color:transparent;background:rgba(15,30,15,.6);}
.choice-btn:hover,.choice-btn:focus{border-color:rgba(245,197,24,.5);background:rgba(245,197,24,.1);outline:none;}
.choice-btn:active{transform:scale(.97);background:rgba(245,197,24,.16);}
.choice-letter{font-family:'Fredoka One',cursive;color:#f5c518;font-size:clamp(.85rem,2vw,.98rem);flex-shrink:0;min-width:16px;}

.consequence{position:absolute;inset:0;z-index:50;background:rgba(0,0,0,.95);display:none;flex-direction:column;align-items:center;justify-content:center;gap:11px;padding:24px;cursor:pointer;pointer-events:all;}
.c-icon{font-size:clamp(3rem,9vw,4.5rem);animation:popIn .55s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.05);opacity:0;}to{transform:scale(1);opacity:1;}}
.c-title{font-family:'Fredoka One',cursive;font-size:clamp(1.1rem,3.5vw,1.5rem);text-align:center;}
.c-desc{font-size:clamp(.7rem,2vw,.88rem);color:rgba(255,255,255,.92);text-align:center;max-width:400px;line-height:1.8;}
.c-wisdom{background:rgba(245,197,24,.07);border:1.5px solid rgba(245,197,24,.25);border-radius:12px;padding:11px 16px;font-size:clamp(.65rem,1.7vw,.8rem);font-style:italic;color:rgba(255,255,255,.6);text-align:center;max-width:400px;line-height:1.72;}
.c-wisdom strong{color:#fdd87a;font-style:normal;}
.c-pts{font-family:'Fredoka One',cursive;font-size:clamp(1.4rem,4.5vw,2rem);color:#f5c518;text-shadow:0 0 22px rgba(245,197,24,.6);}
.c-stars{display:flex;gap:7px;font-size:clamp(1.3rem,4vw,1.8rem);}
.c-tap{font-size:.58rem;color:rgba(255,255,255,.14);animation:blink 1.6s infinite;}

.end-panel{position:absolute;inset:0;z-index:60;background:rgba(0,0,0,.97);display:none;flex-direction:column;align-items:center;justify-content:center;gap:11px;padding:26px;pointer-events:all;}
.ep-icon{font-size:clamp(3.5rem,10vw,5rem);animation:popIn .65s cubic-bezier(.34,1.56,.64,1);}
.ep-title{font-family:'Fredoka One',cursive;font-size:clamp(1.2rem,3.8vw,1.6rem);color:#fdd87a;text-align:center;}
.ep-card{background:rgba(255,255,255,.05);border:2px solid rgba(245,197,24,.28);border-radius:16px;padding:13px 30px;text-align:center;}
.ep-pts{font-family:'Fredoka One',cursive;font-size:clamp(2rem,6vw,2.8rem);color:#f5c518;}
.ep-sub{font-size:clamp(.56rem,1.5vw,.68rem);color:rgba(255,255,255,.32);}
.ep-stars{font-size:clamp(1.6rem,5vw,2.1rem);display:flex;gap:6px;justify-content:center;margin:5px 0;}
.ep-badge{font-family:'Fredoka One',cursive;font-size:clamp(.82rem,2vw,.98rem);background:rgba(45,140,45,.32);border:2px solid #4ab44a;border-radius:20px;padding:8px 20px;color:#fff;}
.ep-msg{font-size:clamp(.68rem,1.8vw,.82rem);color:rgba(255,255,255,.55);text-align:center;max-width:320px;line-height:1.75;font-style:italic;}
.ep-btns{display:flex;gap:11px;margin-top:6px;}
.ep-btn{font-family:'Fredoka One',cursive;font-size:clamp(.8rem,2vw,.95rem);padding:12px 20px;border-radius:20px;border:none;cursor:pointer;transition:transform .1s;}
.ep-btn:active{transform:scale(.94);}
.ep-btn.green{background:linear-gradient(135deg,#4ab44a,#2d8c2d);color:#fff;box-shadow:0 4px 16px rgba(74,180,74,.42);}
.ep-btn.gold{background:linear-gradient(135deg,#f5c518,#e07b30);color:#1a0600;box-shadow:0 4px 16px rgba(245,197,24,.42);}

/* PERSONAJES SVG */
.char-wrap{position:relative;display:inline-flex;flex-direction:column;align-items:center;gap:3px;transform-origin:bottom center;transition:filter .3s ease,transform .3s ease;}
.char-wrap.DIM{filter:brightness(.28) saturate(.1);}
.char-wrap.FOCUS{filter:none;transform:scale(1.08) translateY(-8px);}
.char-label{font-size:clamp(.52rem,1.3vw,.62rem);font-weight:800;padding:3px 9px;border-radius:7px;background:rgba(0,0,0,.82);color:#fff;white-space:nowrap;border:1px solid rgba(255,255,255,.1);}
.char-label.HL{color:#f5c518;}

/* Animaciones personajes */
.anim-idle .torsoG{animation:breathe 3s ease-in-out infinite;}
.anim-idle .headG{animation:headSway 4s ease-in-out infinite;}
@keyframes breathe{0%,100%{transform:translateY(0);}50%{transform:translateY(-1.5px);}}
@keyframes headSway{0%,100%{transform:translateX(0) rotate(0deg);}33%{transform:translateX(1.5px) rotate(.8deg);}66%{transform:translateX(-1.5px) rotate(-.8deg);}}

.anim-talk .torsoG{animation:breathe 1.8s ease-in-out infinite;}
.anim-talk .headG{animation:talkHead 1.1s ease-in-out infinite;}
.anim-talk .mouthPath{animation:talkMouth .25s ease-in-out infinite alternate;}
.anim-talk .rarmG{animation:talkArm .8s ease-in-out infinite;}
@keyframes talkHead{0%,100%{transform:rotate(0);}50%{transform:rotate(1.5deg) translateX(1px);}}
@keyframes talkMouth{0%{d:path("M44,70 Q50,73 56,70");}100%{d:path("M44,70 Q50,76 56,70");}}
@keyframes talkArm{0%,100%{transform:rotate(0) translateX(0);}50%{transform:rotate(-18deg) translateX(1px);}}

.anim-happy .torsoG{animation:jumpBounce .5s ease-in-out infinite;}
.anim-happy .headG{animation:happyHead .5s ease-in-out infinite;}
.anim-happy .larmG{animation:happyArmL .5s ease-in-out infinite;}
.anim-happy .rarmG{animation:happyArmR .5s ease-in-out infinite;}
@keyframes jumpBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
@keyframes happyHead{0%,100%{transform:rotate(-3deg);}50%{transform:rotate(3deg);}}
@keyframes happyArmL{0%,100%{transform:rotate(-45deg) translateX(0);}50%{transform:rotate(-50deg) translateX(-1px);}}
@keyframes happyArmR{0%,100%{transform:rotate(45deg) translateX(0);}50%{transform:rotate(50deg) translateX(1px);}}

.anim-sad .headG{animation:sadHead 2s ease-in-out infinite;}
.anim-sad .torsoG{animation:sadTorso 2s ease-in-out infinite;}
@keyframes sadHead{0%,100%{transform:rotate(8deg) translateY(3px);}50%{transform:rotate(10deg) translateY(4px);}}
@keyframes sadTorso{0%,100%{transform:translateY(2px);}50%{transform:translateY(3px);}}

.anim-angry .rarmG{animation:angryArm .4s ease-in-out infinite alternate;}
.anim-angry .headG{animation:angryHead .4s ease-in-out infinite alternate;}
@keyframes angryArm{0%{transform:rotate(50deg);}100%{transform:rotate(62deg);}}
@keyframes angryHead{0%{transform:translateX(1px);}100%{transform:translateX(3px) rotate(3deg);}}

.anim-walk .llegG{animation:walkLegL .5s ease-in-out infinite;}
.anim-walk .rlegG{animation:walkLegR .5s ease-in-out infinite;}
.anim-walk .larmG{animation:walkArmL .5s ease-in-out infinite;}
.anim-walk .rarmG{animation:walkArmR .5s ease-in-out infinite;}
.anim-walk .torsoG{animation:walkBob .25s ease-in-out infinite;}
@keyframes walkLegL{0%,100%{transform:rotate(-25deg);}50%{transform:rotate(25deg);}}
@keyframes walkLegR{0%,100%{transform:rotate(25deg);}50%{transform:rotate(-25deg);}}
@keyframes walkArmL{0%,100%{transform:rotate(20deg);}50%{transform:rotate(-20deg);}}
@keyframes walkArmR{0%,100%{transform:rotate(-20deg);}50%{transform:rotate(20deg);}}
@keyframes walkBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-1.5px);}}

.anim-meditate .headG{animation:meditHead 4s ease-in-out infinite;}
.anim-meditate .larmG{transform:rotate(-30deg);}
.anim-meditate .rarmG{transform:rotate(30deg);}
@keyframes meditHead{0%,100%{transform:rotate(0);}50%{transform:rotate(3deg);}}

/* FONDOS ESCENA */
.bg-colegio{background:linear-gradient(180deg,#2a78c0 0%,#5ab0e0 38%,#e8d8a0 38.1%,#c87040 55%,#9a5028 100%);}
.bg-salon{background:linear-gradient(180deg,#e8d8a0 0%,#c8a850 20%,#c87848 20.1%,#9a5028 100%);}
.bg-patio{background:linear-gradient(180deg,#4aa0d8 0%,#a8d8f0 28%,#e8d080 28.1%,#c87040 40%,#8a4818 100%);}
.bg-cancha{background:linear-gradient(180deg,#3a90c0 0%,#90d0f0 26%,#2a8c2a 26.1%,#1a5c18 100%);}
.bg-calle{background:linear-gradient(180deg,#0a1840 0%,#c03010 30%,#e07010 55%,#f0b820 68%,#3a3030 68.1%,#1a1414 100%);}
.bg-casa{background:linear-gradient(180deg,#e8d8a8 0%,#c8a858 18%,#c87848 18.1%,#8a4828 100%);}
.bg-rio{background:linear-gradient(180deg,#1a6aaa 0%,#5ab0d0 35%,#1a4a1a 35.1%,#104010 45%,rgba(25,80,180,.85) 55%,rgba(20,65,160,.7) 65%,#8b7040 65.1%,#6b5020 100%);}

/* Elementos deco escena */
.scene-sun{position:absolute;top:6%;right:15%;width:clamp(40px,7vw,65px);height:clamp(40px,7vw,65px);background:radial-gradient(circle,#fffce0 20%,#f9d030 50%,rgba(249,190,30,0) 100%);border-radius:50%;animation:sunPulse 6s ease-in-out infinite;}
@keyframes sunPulse{0%,100%{box-shadow:0 0 20px 10px rgba(249,200,30,.22);}50%{box-shadow:0 0 38px 18px rgba(249,200,30,.38);}}
.scene-cloud{position:absolute;pointer-events:none;}
.scene-cloud::before,.scene-cloud::after{content:'';position:absolute;background:rgba(255,255,255,.85);border-radius:50%;}
.cloud-1{top:7%;left:8%;width:80px;height:24px;background:rgba(255,255,255,.82);border-radius:40px;filter:blur(1.5px);animation:cloudDrift 18s linear infinite;}
.cloud-1::before{width:36px;height:36px;top:-18px;left:10px;}
.cloud-1::after{width:28px;height:28px;top:-14px;left:36px;}
.cloud-2{top:11%;right:10%;width:65px;height:20px;background:rgba(255,255,255,.7);border-radius:40px;filter:blur(1.5px);animation:cloudDrift2 24s linear infinite;}
.cloud-2::before{width:28px;height:28px;top:-14px;left:8px;}
.cloud-2::after{width:22px;height:22px;top:-10px;left:28px;}
@keyframes cloudDrift{0%{transform:translateX(0);}100%{transform:translateX(10vw);}}
@keyframes cloudDrift2{0%{transform:translateX(0);}100%{transform:translateX(-8vw);}}

/* Perspectiva piso */
.floor-grid{position:absolute;bottom:0;left:0;right:0;height:38%;background:repeating-linear-gradient(0deg,transparent,transparent calc(10% - 1px),rgba(0,0,0,.05) calc(10%)),repeating-linear-gradient(90deg,transparent,transparent calc(10% - 1px),rgba(0,0,0,.03) calc(10%));transform:perspective(350px) rotateX(52deg);transform-origin:bottom center;}

/* MISC */
.notif{position:absolute;top:62px;left:50%;transform:translateX(-50%);z-index:300;background:rgba(0,0,0,.9);border:1.5px solid rgba(245,197,24,.48);color:#fdd87a;font-family:'Fredoka One',cursive;font-size:clamp(.75rem,2vw,.9rem);padding:8px 20px;border-radius:20px;pointer-events:none;white-space:nowrap;animation:notifAnim 2.8s ease forwards;}
@keyframes notifAnim{0%{opacity:0;transform:translateX(-50%) translateY(-10px);}10%{opacity:1;transform:translateX(-50%) translateY(0);}80%{opacity:1;}100%{opacity:0;}}
.spark{position:absolute;pointer-events:none;z-index:200;animation:sparkFly 1.4s ease forwards;}
@keyframes sparkFly{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(.3);}}
</style>
</head>

/* ══ TTS ══ */
var TTS=(function(){
  var sy=window.speechSynthesis,ve=null,vf=null,vm=null;
  function load(){
    if(!sy)return;var vs=sy.getVoices();if(!vs||!vs.length)return;
    vs.forEach(function(v){
      if(!v.lang||v.lang.indexOf('es')<0)return;
      if(!ve)ve=v;
      if(v.lang==='es-CO'||v.lang==='es-419'){if(!ve||ve.lang!=='es-CO')ve=v;}
      var n=v.name.toLowerCase();
      if(!vf&&(n.includes('female')||n.includes('paulina')||n.includes('monica')||n.includes('valentina')))vf=v;
      if(!vm&&(n.includes('male')||n.includes('jorge')||n.includes('carlos')||n.includes('diego')))vm=v;
    });
  }
  if(sy){sy.onvoiceschanged=load;setTimeout(load,200);}
  return{
    say:function(txt,o){
      if(!sy||!txt)return;o=o||{};
      try{sy.cancel();var u=new SpeechSynthesisUtterance(txt);
        u.lang=o.lang||'es-CO';u.rate=o.rate||0.91;u.pitch=o.pitch||1;u.volume=o.vol||1;
        var v=o.gender==='f'?(vf||ve):(o.gender==='m'?(vm||ve):ve);if(v)u.voice=v;
        sy.speak(u);setTimeout(function(){if(!sy.speaking)try{sy.speak(u);}catch(e){}},300);
      }catch(e){}
    },
    stop:function(){if(sy)try{sy.cancel();}catch(e){}}
  };
})();

var _ac=null;
function AC(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();if(_ac.state==='suspended')_ac.resume();return _ac;}
function tone(f,d,v,t,dl){v=v||.07;t=t||'sine';dl=dl||0;
  try{var o=AC().createOscillator(),g=AC().createGain();o.type=t;o.frequency.value=f;
  var ct=AC().currentTime+dl;g.gain.setValueAtTime(0,ct);g.gain.linearRampToValueAtTime(v,ct+.015);g.gain.exponentialRampToValueAtTime(.001,ct+d);
  o.connect(g);g.connect(AC().destination);o.start(ct);o.stop(ct+d+.06);}catch(e){}}

function dk(h,f){var n=parseInt(h.replace('#',''),16);return '#'+[n>>16&255,n>>8&255,n&255].map(function(c){return Math.max(0,Math.floor(c*f)).toString(16).padStart(2,'0');}).join('');}
function lt(h,f){var n=parseInt(h.replace('#',''),16);return '#'+[n>>16&255,n>>8&255,n&255].map(function(c){return Math.min(255,Math.floor(c*f)).toString(16).padStart(2,'0');}).join('');}

  var w=document.createElement('div');
  w.className='char-wrap anim-'+(state||'idle');
  var d=document.createElement('div');d.innerHTML=makeSVG(cfg,size);
  var lb=document.createElement('div');lb.className='char-label';lb.textContent=label;
  w.appendChild(d);w.appendChild(lb);w._lb=lb;w._cfg=cfg;return w;
}
function setState(w,s){
  var cls=w.className.replace(/anim-\S+/,'anim-'+s);
  w.className=cls;
}
function miniAv(cont,cfg,sz){cont.innerHTML=makeSVG(cfg,sz||26);}

/* ══ MAPA ══ */
var mpx=50,mpy=50,vx=0,vy=0;
var HELD={u:0,d:0,l:0,r:0};
var nearP=null,GT=0;

function buildWorldUI(){
  var lv=getLvl();
  el('hudName').textContent=G.nombre;
  el('hudLevel').textContent=lv.icon+' '+lv.title;
  el('hudPts').textContent=G.pts;
  var idx=0;LEVELS.forEach(function(l,i){if(l.n===lv.n)idx=i;});
  var nx=LEVELS[idx+1];
  el('xpFill').style.width=(nx?Math.min(100,(G.pts-lv.min)/(nx.min-lv.min)*100):100)+'%';
  // markers handled by buildMapMarkers()
  miniAv(el('hudAv'),G,34);
  buildMapMarkers();
}

function buildMapMarkers(){
  var overlay=el('mapOverlay');overlay.innerHTML='';
  PLACES.forEach(function(pl){
    var mk=document.createElement('div');mk.className='place-marker';
    mk.style.left=pl.wx+'%';mk.style.top=pl.wy+'%';
    var ring=document.createElement('div');
    ring.className='pm-ring'+(G.done[pl.id]?' done':'');
    ring.style.background=pl.col;
    ring.innerHTML=pl.icon;
    var pulse=document.createElement('div');
    pulse.className='pm-pulse'+(G.done[pl.id]?' done':'');
    ring.appendChild(pulse);
    var lbl=document.createElement('div');
    lbl.className='pm-label'+(G.done[pl.id]?' done':'');
    lbl.textContent=(G.done[pl.id]?'✅ ':'')+pl.name;
    var tip=document.createElement('div');
    tip.className='pm-tooltip';
    tip.textContent=pl.story.theme;
    mk.appendChild(tip);mk.appendChild(ring);mk.appendChild(lbl);
    mk.addEventListener('pointerup',function(e){e.preventDefault();sfxEnter();enterPlace(pl);});
    overlay.appendChild(mk);
  });
}

function drawMap(){
  // No canvas needed — image is static, only update player position
}

function updatePlayer(){
  var ACC=0.55,MAX=2.2,FR=0.78;
  if(HELD.u)vy-=ACC;if(HELD.d)vy+=ACC;if(HELD.l)vx-=ACC;if(HELD.r)vx+=ACC;
  vx*=FR;vy*=FR;if(Math.abs(vx)<.05)vx=0;if(Math.abs(vy)<.05)vy=0;
  var spd=Math.hypot(vx,vy);if(spd>MAX){vx=vx/spd*MAX;vy=vy/spd*MAX;}
  mpx=Math.max(4,Math.min(96,mpx+vx));mpy=Math.max(16,Math.min(94,mpy+vy));
  var pdot=el('playerOnMap');
  var frame=el('mapFrame')||document.getElementById('S2');
  var W=frame.offsetWidth,H=frame.offsetHeight;
  pdot.style.left=(mpx/100*W-26)+'px';pdot.style.top=(mpy/100*H-68)+'px';
  var cw=pdot.querySelector('.char-wrap');
  if(cw){var st=spd>.15?'walk':'idle';if(cw.className.indexOf('anim-'+st)<0)setState(cw,st);}
  var near=null,minD=99;
  PLACES.forEach(function(pl){var d=Math.hypot(pl.wx-mpx,pl.wy-mpy);if(d<9&&d<minD){near=pl;minD=d;}});
  if(near!==nearP){
    nearP=near;var eb=el('enterBtn');
    if(near){eb.style.display='block';eb.textContent='⬆ '+near.icon+' '+near.name;}
    else eb.style.display='none';
  }
}

/* ══ ESCENA — Sistema de FASES ══ */
var curPlace=null,curStory=null,curPhaseIdx=0,curLine=0,scenePts=0;
var sChars={},whoActive=null,typTimer=null,typDone=false;

function setupBG(bgKey){
  var bg=el('sceneBg');bg.className='scene-bg bg-'+bgKey;bg.innerHTML='';
  var hasSun=['colegio','patio','cancha','rio'].indexOf(bgKey)>=0;
  if(hasSun){var s=document.createElement('div');s.className='scene-sun';bg.appendChild(s);}
  var c1=document.createElement('div');c1.className='scene-cloud cloud-1';bg.appendChild(c1);
  var c2=document.createElement('div');c2.className='scene-cloud cloud-2';bg.appendChild(c2);
  var fl=document.createElement('div');fl.className='floor-grid';bg.appendChild(fl);
}

function buildStage(story){
  var stage=el('stage');stage.innerHTML='';sChars={};
  var n=story.cast.length;
  var pos=n===1?[[50,0]]:n===2?[[28,2],[72,-2]]:[[16,4],[50,-4],[84,3]];
  story.cast.forEach(function(c,i){
    var p=pos[i]||[50,0];
    var cfg=c.id==='pl'?G:(NPCS[c.npc]||G);
    var lbl=c.id==='pl'?G.nombre:(c.name||'?');
    var sz=Math.round(clamp(window.innerWidth*.17,75,128));
    var w=mkChar(cfg,lbl,sz,'idle');
    w.id='sc_'+c.id;w.style.position='absolute';
    w.style.bottom=(8+Math.abs(p[1]))+'%';
    w.style.left='calc('+p[0]+'% - '+(sz/2)+'px)';
    stage.appendChild(w);sChars[c.id]=w;
  });
}

function hlChar(id){
  Object.keys(sChars).forEach(function(k){
    var w=sChars[k];
    if(id&&k!==id){w.classList.add('DIM');w.classList.remove('FOCUS');w._lb.classList.remove('HL');}
    else if(id&&k===id){w.classList.remove('DIM');w.classList.add('FOCUS');w._lb.classList.add('HL');}
    else{w.classList.remove('DIM','FOCUS');w._lb.classList.remove('HL');}
  });
}

function typeText(elem,text,cb){
  clearTimeout(typTimer);elem.innerHTML='';typDone=false;var i=0;
  var cur='<span style="display:inline-block;width:2px;height:11px;background:#f5c518;vertical-align:middle;margin-left:2px;border-radius:1px;animation:blink .7s infinite"></span>';
  (function tick(){
    if(i>=text.length){elem.innerHTML=text;typDone=true;if(cb)cb();return;}
    var ch=text[i];elem.innerHTML=text.slice(0,++i)+cur;
    var d=ch==='.'||ch==='!'||ch==='?'?260:ch===','?120:17;
    typTimer=setTimeout(tick,d);
  })();
}

function getCurPhase(){return curStory.phases[curPhaseIdx];}

function showLine(){
  var phase=getCurPhase();
  if(!phase){showChoices();return;}
  if(curLine>=phase.lines.length){showChoices();return;}
  var ln=phase.lines[curLine];
  var castId=ln.cast,cfg=null,isNarr=!castId;
  if(castId==='pl'){cfg=G;whoActive=G;}
  else if(castId){
    curStory.cast.forEach(function(c){if(c.id===castId&&c.npc){cfg=NPCS[c.npc];}});
    if(!cfg)cfg=G;whoActive=cfg;
  } else whoActive=null;
  if(castId&&sChars[castId]){
    setState(sChars[castId],'talk');
    Object.keys(sChars).forEach(function(k){if(k!==castId)setState(sChars[k],'idle');});
  }
  hlChar(castId);
  var dname=isNarr?'📖 Narrador':(ln.who===null?G.nombre:ln.who);
  el('dName').textContent=dname;
  var dav=el('dAvatar');
  if(whoActive)miniAv(dav,whoActive,24);else dav.innerHTML='<span style="font-size:15px;line-height:26px">📖</span>';
  el('dialogBox').style.display='block';el('choicesBox').style.display='none';
  tone(520+Math.random()*60,.04,.06);
  typeText(el('dText'),ln.text,function(){
    if(ln.text&&!ln.text.startsWith('(')){
      var g=whoActive?whoActive.genero:'m';
      TTS.say(ln.text,{rate:isNarr?.87:.93,pitch:isNarr?.92:(g==='f'?1.16:.84),gender:g,vol:1});
    }
    el('dialogBox').onclick=function(){
      if(!typDone){clearTimeout(typTimer);el('dText').innerHTML=ln.text;typDone=true;return;}
      el('dialogBox').onclick=null;TTS.stop();curLine++;showLine();
    };
  });
}

function showChoices(){
  el('dialogBox').style.display='none';
  el('choicesBox').style.display='flex';
  el('choicesBox').style.flexDirection='column';
  hlChar(null);
  Object.keys(sChars).forEach(function(k){setState(sChars[k],'idle');});
  // Indicador de fase
  var ph=curPhaseIdx+1,tot=curStory.phases.length;
  el('sSub').textContent=curStory.theme+' · Etapa '+ph+'/'+tot;
  TTS.say('¿Qué decides hacer?',{rate:.9,pitch:1,vol:.85});
  var grid=el('choicesGrid');grid.innerHTML='';
  getCurPhase().choices.forEach(function(ch){
    var btn=document.createElement('button');
    btn.type='button';btn.className='choice-btn';
    btn.innerHTML='<span class="choice-letter">'+ch.id+')</span><span>'+ch.text+'</span>';
    (function(c){
      btn.addEventListener('pointerup',function(e){e.preventDefault();e.stopPropagation();onChoice(c);});
    })(ch);
    grid.appendChild(btn);
  });
}

function onChoice(ch){
  el('choicesBox').style.display='none';el('choicesGrid').innerHTML='';
  if(ch.sfx==='good')sfxGood();else if(ch.sfx==='bad')sfxBad();else if(ch.sfx==='coin')sfxCoin();else sfxClick();
  G.pts+=ch.pts;scenePts+=ch.pts;el('sPts').textContent=G.pts;
  if(sChars['pl'])setState(sChars['pl'],ch.sp||'talk');
  Object.keys(sChars).forEach(function(k){if(k!=='pl')setState(sChars[k],ch.sn||'idle');});
  if(ch.pts>=20)sparks();
  setTimeout(function(){showCons(ch);},420);
}

function showCons(ch){
  var r=ch.result;
  el('cIcon').textContent=r.icon;el('cTitle').textContent=r.title;el('cTitle').style.color=r.col||'#fdd87a';
  el('cDesc').textContent=r.desc;el('cWisdom').innerHTML='🌿 <strong>Sabiduría del Sinú:</strong> '+r.wisdom;
  el('cPts').textContent='+'+ch.pts+' semillas';
  var st='';for(var i=0;i<3;i++)st+='<span style="filter:'+(i<ch.stars?'none':'grayscale(1) opacity(.28)')+'">⭐</span>';
  el('cStars').innerHTML=st;
  TTS.say(r.wisdom,{rate:.85,pitch:.95,vol:.95});
  var cons=el('consequence');cons.style.display='flex';
  cons.onclick=function(){
    cons.style.display='none';
    // ¿Hay más fases?
    var nextPhase=r.next;
    if(nextPhase>=0&&nextPhase<curStory.phases.length){
      curPhaseIdx=nextPhase;curLine=0;
      // Mostrar intro de siguiente fase
      showPhaseIntro();
    } else {
      showEnd();
    }
  };
}

function showPhaseIntro(){
  // Pequeño panel de transición de fase
  var ph=curPhaseIdx+1,tot=curStory.phases.length;
  var msg=ph===2?'Segunda etapa: el conflicto se profundiza...':
          ph===3?'Tercera etapa: el momento decisivo...':'Siguiente etapa...';
  el('dName').textContent='📖 Narrador';
  el('dAvatar').innerHTML='<span style="font-size:15px;line-height:26px">📖</span>';
  el('dialogBox').style.display='block';el('choicesBox').style.display='none';
  typeText(el('dText'),'— '+msg+' — (Etapa '+ph+'/'+tot+')',function(){
    el('dialogBox').onclick=function(){
      if(!typDone)return;el('dialogBox').onclick=null;TTS.stop();showLine();
    };
  });
}

function showEnd(){
  G.done[curPlace.id]=true;
  var stars=scenePts>=80?3:scenePts>=50?2:1;
  var data=stars===3?['🏆','¡Historia completada con maestría!','Tu sabiduría y empatía transforman el Alto Sinú.']:
            stars===2?['🌺','¡Historia completada!','Cada semilla que plantas florece en la comunidad del Sinú.']:
                      ['🌱','Historia completada. ¡Sigue aprendiendo!','El río Sinú cambia de cauce hasta encontrar su camino.'];
  el('epIcon').textContent=data[0];el('epTitle').textContent=data[1];
  el('epPts').textContent=scenePts;
  el('epSub').textContent='semillas · total: '+G.pts+' 🌸';
  var st='';for(var i=0;i<3;i++)st+='<span style="filter:'+(i<stars?'none':'grayscale(1) opacity(.28)')+'">⭐</span>';
  el('epStars').innerHTML=st;
  var lv=getLvl();el('epBadge').textContent=lv.icon+' '+lv.title;
  el('epMsg').textContent=data[2];
  TTS.say(data[1]+'. '+data[2],{rate:.88,pitch:1.02,vol:1});
  el('endPanel').style.display='flex';buildWorldUI();
}

function sparks(){
  var em=['🌸','🌺','🦋','🌿','✨','💛','⭐','🌟','💫'];
  for(var i=0;i<16;i++){(function(){
    var s=document.createElement('div');s.className='spark';
    s.style.cssText='left:'+(15+Math.random()*70)+'%;top:'+(25+Math.random()*30)+'%;'+
      '--sx:'+Math.round((Math.random()-.5)*200)+'px;--sy:'+Math.round(-80-Math.random()*100)+'px;'+
      'font-size:'+(0.9+Math.random()*.8)+'rem;animation-delay:'+(Math.random()*.2)+'s;'+
      'position:absolute;z-index:200;pointer-events:none;';
    s.textContent=em[Math.floor(Math.random()*em.length)];
    el('app').appendChild(s);setTimeout(function(){s.remove();},1600);
  })();}
}

/* ══ INIT ══ */
window.addEventListener('load',function(){
  // Personajes pantalla título
  var t0=el('t0chars');
  [{piel:'#a0622a',pelo:'#120800',uni:'dep',hair:'s',genero:'m'},G,{piel:'#d4946a',pelo:'#3d1c02',uni:'dep',hair:'l',genero:'f'}].forEach(function(cfg,i){
    var sz=i===1?96:74;
    var w=mkChar(cfg,'',sz,['happy','idle','talk'][i]);
    w._lb.style.display='none';t0.appendChild(w);
  });

  el('btnPlay').onclick=function(){sfxClick();goTo('S1');};
  el('btnInfo').onclick=function(){
    sfxClick();TTS.say('Semillas de Paz. Juego educativo de la Escuela Normal Superior del Alto Sinú en Tierralta, Córdoba. Siete historias largas sobre paz, medioambiente y convivencia.',{rate:.88});
    notif('🕊 ENSAS · Tierralta · Alto Sinú · Córdoba');
  };
  el('avBack').onclick=function(){sfxClick();goTo('S0');};

  function setupOpts(gid,key){
    document.querySelectorAll('#'+gid+' .opt-chip').forEach(function(e){
      e.onclick=function(){G[key]=e.dataset.v;
        document.querySelectorAll('#'+gid+' .opt-chip').forEach(function(x){x.classList.remove('ON');});
        e.classList.add('ON');sfxClick();refreshAv();};
    });
  }
  function setupSw(gid,key){
    document.querySelectorAll('#'+gid+' .swatch').forEach(function(e){
      e.onclick=function(){G[key]=e.dataset.v;
        document.querySelectorAll('#'+gid+' .swatch').forEach(function(x){x.classList.remove('ON');});
        e.classList.add('ON');sfxClick();refreshAv();};
    });
  }
  function refreshAv(){
    var prev=el('avPreview');prev.innerHTML=makeSVG(G,(prev.clientWidth||125)-12);
  }
  setupOpts('og','genero');setupSw('sp','piel');setupSw('sh','pelo');setupOpts('ohl','hair');setupOpts('ou','uni');
  setTimeout(refreshAv,150);

  el('btnStart').onclick=function(){
    var nm=el('avName').value.trim();
    if(!nm){el('avName').focus();el('avName').style.border='2px solid #f5c518';return;}
    G.nombre=nm;sfxLvl();
    TTS.say('¡Bienvenido '+nm+' a la Escuela Normal Superior del Alto Sinú! Tu misión: sembrar paz en Tierralta.',{rate:.88,pitch:G.genero==='f'?1.12:.88});
    var pdot=el('playerOnMap');pdot.innerHTML='';
    var sz=Math.round(clamp(window.innerWidth*.13,50,68));
    pdot.appendChild(mkChar(G,G.nombre,sz,'idle'));
    miniAv(el('hudAv'),G,34);miniAv(el('sHudAv'),G,30);
    buildWorldUI();buildMapMarkers();goTo('S2');
  };

  ['U','D','L','R'].forEach(function(d){
    var k=d.toLowerCase(),b=el('dp'+d);
    b.addEventListener('pointerdown',function(e){e.preventDefault();HELD[k]=1;b.classList.add('HELD');},{passive:false});
    ['pointerup','pointerleave','pointercancel'].forEach(function(ev){b.addEventListener(ev,function(){HELD[k]=0;b.classList.remove('HELD');});});
  });
  var KM={ArrowUp:'u',ArrowDown:'d',ArrowLeft:'l',ArrowRight:'r',w:'u',s:'d',a:'l',d:'r'};
  window.addEventListener('keydown',function(e){if(KM[e.key])HELD[KM[e.key]]=1;if((e.key==='Enter'||e.key===' ')&&nearP)enterPlace(nearP);});
  window.addEventListener('keyup',function(e){if(KM[e.key])HELD[KM[e.key]]=0;});
  el('enterBtn').onclick=function(){if(nearP)enterPlace(nearP);};
  var ts=null;
  el('S2').addEventListener('touchstart',function(e){ts={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
  el('S2').addEventListener('touchmove',function(e){if(!ts)return;vx+=(e.touches[0].clientX-ts.x)*.07;vy+=(e.touches[0].clientY-ts.y)*.07;ts={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
  el('S2').addEventListener('touchend',function(){ts=null;},{passive:true});

  el('sceneClose').onclick=function(){TTS.stop();sfxClick();buildMapMarkers();goTo('S2');};
  el('epRetry').onclick=function(){
    if(curPlace){
      scenePts=0;curPhaseIdx=0;curLine=0;
      el('endPanel').style.display='none';el('consequence').style.display='none';
      // Reset fase en la story
      curStory.phases.forEach(function(ph){if(ph.selected)delete ph.selected;});
      buildStage(curStory);showLine();
    }
  };
  el('epMap').onclick=function(){TTS.stop();buildMapMarkers();goTo('S2');};
  requestAnimationFrame(mainLoop);
});

function mainLoop(ts){
  GT=ts/1000;
  if(el('S2').classList.contains('ON')){
    updatePlayer();
  }
  requestAnimationFrame(mainLoop);
}

function enterPlace(pl){
  sfxEnter();TTS.stop();goTo('S3');
  setTimeout(function(){
    curPlace=pl;curStory=pl.story;curPhaseIdx=0;curLine=0;scenePts=0;
    el('sLoc').textContent=pl.icon+' '+pl.name;
    el('sSub').textContent=pl.story.theme+' · Etapa 1/'+pl.story.phases.length;
    el('sPts').textContent=G.pts;
    setupBG(pl.bg);buildStage(curStory);
    el('endPanel').style.display='none';el('consequence').style.display='none';
    el('choicesBox').style.display='none';el('dialogBox').style.display='block';el('dialogBox').onclick=null;
    TTS.say(pl.name+'. '+pl.story.title,{rate:.92,pitch:1.05});
    typeText(el('dText'),pl.story.title+' — '+pl.story.theme,function(){
      el('dName').textContent='📖 Narrador';
      el('dAvatar').innerHTML='<span style="font-size:15px;line-height:26px">📖</span>';
      el('dialogBox').onclick=function(){
        if(!typDone)return;el('dialogBox').onclick=null;TTS.stop();curLine=0;showLine();
      };
    });
  },160);
}

})();
</script>
